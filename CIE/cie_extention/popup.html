<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIE Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status.online {
      background: rgba(16, 185, 129, 0.3);
    }
    
    .status.offline {
      background: rgba(239, 68, 68, 0.3);
    }
    
    .status-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
    }
    
    .status.offline .status-icon {
      background: #ef4444;
    }
    
    .info-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .info-box h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .info-box p {
      font-size: 12px;
      line-height: 1.6;
      opacity: 0.9;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.15);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 11px;
      opacity: 0.8;
    }
    
    .button {
      width: 100%;
      padding: 12px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .button:hover {
      transform: scale(1.02);
    }
    
    .button:active {
      transform: scale(0.98);
    }
    
    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📘 CIE Agent</h1>
      <p>LinkedIn Bookmarker</p>
    </div>
    
    <div class="status" id="status">
      <div class="status-icon"></div>
      <span id="status-text">Checking...</span>
    </div>
    
    <div class="info-box">
      <h3>📌 How to Use</h3>
      <p>
        1. Open any LinkedIn post<br>
        2. Click "📘 Save to CIE Agent" button<br>
        3. Post is automatically saved and analyzed!
      </p>
    </div>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="total-saved">0</div>
        <div class="stat-label">Saved Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="backend-status">--</div>
        <div class="stat-label">Status</div>
      </div>
    </div>
    
    <button class="button" id="open-app">
      🚀 Open CIE Agent App
    </button>
    
    <div class="footer">
      v1.0.0 | Built with ❤️
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
